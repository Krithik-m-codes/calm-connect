<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Page Not Found | Redirecting</title>
    <meta http-equiv="refresh" content="0;url=/" />
    <script>
        // JS redirect for hosts that do not honor meta refresh immediately.
        window.location.replace("/");
    </script>
</head>

<body
    style="font-family: Arial, sans-serif; margin: 0; min-height: 100vh; display: grid; place-items: center; background: #f7f4ef; color: #2d4a35;">
    <main style="text-align: center; padding: 24px; max-width: 520px;">
        <h1 style="margin: 0 0 12px; font-size: 28px;">Redirecting to home...</h1>
        <p style="margin: 0 0 16px; line-height: 1.5;">The page could not be found. You are being sent to the home page.
        </p>
        <p style="margin: 0;">
            <a href="/" style="color: #2d4a35; font-weight: 700;">Go to Home</a>
        </p>
    </main>
</body>

</html>
